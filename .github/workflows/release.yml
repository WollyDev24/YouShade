name: Build Signed YouShade release

on:
  workflow_dispatch:
    inputs:
      release_version:
        description: "Version name (e.g., 1.0.0)"
        required: true
        default: "1.0.0"
      release_notes:
        description: "Changes in this release (supports Markdown)"
        required: true

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: "17"
          distribution: "temurin"

      - name: Decode Keystore
        run: |
          echo "${{ secrets.SIGNING_KEY }}" | base64 --decode > Kuper/app/release.jks

      - name: permission for gradlew
        run: chmod +x Kuper/gradlew

      - name: Build with Gradle
        run: cd Kuper && ./gradlew assembleRelease
        env:
          KEYSTORE_PASSWORD: ${{ secrets.KEY_STORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ github.event.inputs.release_version }}
          name: Release ${{ github.event.inputs.release_version }}
          body: ${{ github.event.inputs.release_notes }}
          files: Kuper/app/build/outputs/apk/release/*.apk
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
